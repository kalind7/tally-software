name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      AUTH_URL: ${{ vars.AUTH_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync database schema
        run: npx prisma db push

      - name: Build application
        run: npm run build

      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "::error::RENDER_DEPLOY_HOOK_URL secret is not set. See DEPLOY.md."
            exit 1
          fi
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
          echo "## Deploy triggered" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "${{ vars.RENDER_SERVICE_URL }}" ]; then
            echo "Live URL: ${{ vars.RENDER_SERVICE_URL }}" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Set repository variable RENDER_SERVICE_URL to show the live link here." >> "$GITHUB_STEP_SUMMARY"
          fi
