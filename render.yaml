# Render Blueprint — create once at https://dashboard.render.com/blueprints
# After creating the service: disable Auto-Deploy and use the Deploy Hook in GitHub Actions.

services:
  - type: web
    name: tallyco
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /login
    autoDeploy: false
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: AUTH_SECRET
        sync: false
      - key: AUTH_URL
        sync: false
